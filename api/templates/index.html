<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendation Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #4f46e5;
            --primary-glow: rgba(79, 70, 229, 0.4);
            --accent: #06b6d4;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 10% 20%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(6, 182, 212, 0.15) 0px, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        header {
            width: 100%;
            max-width: 1200px;
            padding: 2rem 2rem 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ffffff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 0.75rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--accent);
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--primary-glow);
        }

        .results-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .recommendation-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            padding: 1.5rem;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .recommendation-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.01);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .item-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .item-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .score-badge {
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent);
            border: 1px solid rgba(6, 182, 212, 0.3);
        }

        .item-explanation {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-style: italic;
        }

        .feedback-action {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .rating-stars {
            display: flex;
            gap: 0.25rem;
        }

        .star {
            cursor: pointer;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.2);
            transition: color 0.2s;
        }

        .star.active {
            color: #fbbf24;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .no-data {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Recommendation Lab</h1>
        <div class="badge score-badge" id="system-status">Checking Status...</div>
    </header>

    <div class="container">
        <!-- control panel -->
        <div class="glass-panel control-panel">
            <h2>Configuration</h2>
            
            <div class="input-group">
                <label for="user-select">Select User</label>
                <select id="user-select">
                    {% for u in users %}
                        <option value="{{ u.id }}">{{ u.name }} (ID: {{ u.id }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="input-group">
                <label for="limit-input">Limit Recommendations</label>
                <input type="number" id="limit-input" value="5" min="1" max="10">
            </div>

            <button onclick="fetchRecommendations()">Generate Recs</button>

            <div class="stats-panel">
                <h3>Metrics</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-requests">0</div>
                        <div class="stat-label">Requests</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-latency">0 ms</div>
                        <div class="stat-label">Latency</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-cache">0%</div>
                        <div class="stat-label">Cache Hit</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- results panel -->
        <div class="glass-panel results-panel">
            <h2 id="results-heading">Recommendations</h2>
            <div id="recommendations-container">
                <div class="no-data">Select a user and click Generate to see personalized recommendations.</div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'capstone-key';

        // query health on load
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                const statusBadge = document.getElementById('system-status');
                if (data.status === 'healthy') {
                    statusBadge.innerText = 'System Healthy';
                    statusBadge.style.color = '#10b981';
                    statusBadge.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                    statusBadge.style.background = 'rgba(16, 185, 129, 0.1)';
                } else {
                    statusBadge.innerText = 'System Error';
                    statusBadge.style.color = '#ef4444';
                }
            } catch (err) {
                console.error('health check failed', err);
            }
        }

        // fetch metrics
        async function updateMetrics() {
            try {
                const response = await fetch('/metrics');
                const data = await response.json();
                document.getElementById('stat-requests').innerText = data.total_requests;
                document.getElementById('stat-latency').innerText = data.average_latency_ms + ' ms';
                document.getElementById('stat-cache').innerText = Math.round(data.cache_hit_rate * 100) + '%';
            } catch (err) {
                console.error('metrics fetch failed', err);
            }
        }

        // load recommendations
        async function fetchRecommendations() {
            const userId = document.getElementById('user-select').value;
            const limit = document.getElementById('limit-input').value;
            const container = document.getElementById('recommendations-container');
            const heading = document.getElementById('results-heading');

            container.innerHTML = '<div class="no-data">Loading recommendations...</div>';

            try {
                const response = await fetch(`/recommend/${userId}?limit=${limit}`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                
                if (!response.ok) {
                    throw new Error(await response.text());
                }

                const data = await response.json();
                heading.innerText = `Recommendations for ${data.user_name} ${data.cached ? '(Cached)' : ''}`;
                
                if (data.recommendations.length === 0) {
                    container.innerHTML = '<div class="no-data">No recommendations found. Try logging feedback.</div>';
                    return;
                }

                container.innerHTML = data.recommendations.map(r => `
                    <div class="recommendation-card">
                        <div class="item-info">
                            <div class="item-title">${r.title}</div>
                            <div class="item-meta">
                                <span class="badge">${r.category}</span>
                                <span class="badge score-badge">Score: ${r.score}</span>
                            </div>
                            <div class="item-explanation">Why: ${r.explanation}</div>
                        </div>
                        <div class="feedback-action">
                            <label>Rate this item</label>
                            <div class="rating-stars" data-content-id="${r.content_id}">
                                ${[1, 2, 3, 4, 5].map(star => `
                                    <span class="star" onclick="submitFeedback(${userId}, ${r.content_id}, ${star})">&#9733;</span>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');

                await updateMetrics();
            } catch (err) {
                container.innerHTML = `<div class="no-data" style="color: #ef4444;">Error fetching recommendations: ${err.message}</div>`;
            }
        }

        // log user rating feedback
        async function submitFeedback(userId, contentId, rating) {
            try {
                const response = await fetch('/feedback', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': API_KEY
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        content_id: contentId,
                        type: 'rating',
                        rating: parseFloat(rating)
                    })
                });

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                alert(`Feedback submitted! Rating: ${rating}/5`);
                // reload recommendations to reflect feedback
                await fetchRecommendations();
            } catch (err) {
                alert(`Error submitting feedback: ${err.message}`);
            }
        }

        // init
        checkHealth();
        updateMetrics();
    </script>
</body>
</html>
